<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1e1e1e;
    --bg2:       #252526;
    --bg3:       #2d2d30;
    --border:    #3c3c3c;
    --text:      #cccccc;
    --text-dim:  #6a6a6a;
    --accent:    #569cd6;
    --green:     #6a9955;
    --red:       #f48771;
    --code:      #9cdcfe;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 10px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title { font-size: 13px; font-weight: 600; color: #e1e1e1; }
  .header-file  { font-size: 11px; color: var(--text-dim); margin-left: auto; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }

  .tab {
    padding: 7px 16px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: color 0.1s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Content ── */
  .content { flex: 1; overflow: hidden; }

  .panel { display: none; height: 100%; }
  .panel.active { display: flex; flex-direction: column; }

  .preview {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.65;
    white-space: pre;
    overflow-x: auto;
    color: var(--code);
    background: var(--bg);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 6px;
    color: var(--text-dim);
  }
  .empty-state p   { font-size: 13px; color: #555; }
  .empty-state small { font-size: 11px; }

  /* ── Footer ── */
  .footer {
    padding: 8px 14px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status { font-size: 11px; color: var(--text-dim); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status.error   { color: var(--red); }
  .status.success { color: var(--green); }

  .btn {
    padding: 5px 12px;
    border: none;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover    { opacity: 0.82; }
  .btn:disabled { opacity: 0.35; cursor: default; }

  .btn-ghost   { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-primary { background: #0e639c; color: #fff; }
  .btn-export  { background: var(--green); color: #fff; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Token Exporter</span>
  <span class="header-file" id="fileName"></span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="json">JSON</div>
  <div class="tab" data-tab="css">CSS Variables</div>
  <div class="tab" data-tab="ts">TypeScript</div>
</div>

<div class="content">
  <div class="panel active" id="panel-json">
    <div class="preview" id="preview-json">
      <div class="empty-state">
        <p>Kliknij Export, aby wygenerować tokeny</p>
        <small>Variables · Paint · Text · Effect styles</small>
      </div>
    </div>
  </div>
  <div class="panel" id="panel-css">
    <div class="preview" id="preview-css"></div>
  </div>
  <div class="panel" id="panel-ts">
    <div class="preview" id="preview-ts"></div>
  </div>
</div>

<div class="footer">
  <span class="status" id="status">Ready</span>
  <button class="btn btn-ghost"    id="btnCopy"     disabled>Copy</button>
  <button class="btn btn-primary"  id="btnDownload" disabled>Download</button>
  <button class="btn btn-export"   id="btnExport">Export</button>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────

let activeTab = 'json';

// ── Tabs ──────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    document.getElementById(`panel-${activeTab}`).classList.add('active');
  });
});

// ── Buttons ───────────────────────────────────────────────────────────────────

document.getElementById('btnExport').addEventListener('click', () => {
  setStatus('Exporting…');
  document.getElementById('btnExport').disabled = true;
  parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
});

document.getElementById('btnCopy').addEventListener('click', () => {
  const text = document.getElementById(`preview-${activeTab}`).textContent;
  navigator.clipboard.writeText(text).then(() => {
    setStatus('Copied!', 'success');
    setTimeout(() => setStatus('Done', 'success'), 2000);
  });
});

document.getElementById('btnDownload').addEventListener('click', () => {
  const text = document.getElementById(`preview-${activeTab}`).textContent;
  const ext  = { json: 'json', css: 'css', ts: 'ts' }[activeTab];
  const mime = activeTab === 'json' ? 'application/json' : 'text/plain';
  const a    = Object.assign(document.createElement('a'), {
    href:     URL.createObjectURL(new Blob([text], { type: mime })),
    download: `figma-tokens.${ext}`,
  });
  a.click();
  URL.revokeObjectURL(a.href);
});

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ` ${type}` : '');
}

// ── CSS generator ─────────────────────────────────────────────────────────────

function cssVar(name) {
  return '--' + name
    .toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/\//g, '-')
    .replace(/[^a-z0-9-]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function floatWithUnit(value, unit) {
  if (unit === 'px') return `${value}px`;
  if (unit === 'em') return `${value}em`;
  return String(value);
}

function generateCSS(data) {
  const out = [];
  out.push(`/* Figma Token Export — ${data.meta.fileName} */`);
  out.push(`/* ${data.meta.exportedAt} */`);

  // Variables
  for (const [collName, col] of Object.entries(data.variables)) {
    if (!col.modes?.length) continue;
    const [defaultMode, ...otherModes] = col.modes;

    out.push(`\n/* ${collName} */`);
    out.push(':root {');
    emitCssTokens(out, col[defaultMode] ?? {});
    out.push('}');

    for (const mode of otherModes) {
      out.push(`\n[data-theme="${mode.toLowerCase()}"] {`);
      emitCssTokens(out, col[mode] ?? {});
      out.push('}');
    }
  }

  // Paint styles
  const paints = Object.entries(data.paintStyles).filter(([, s]) => s.value);
  if (paints.length) {
    out.push('\n/* Paint Styles */');
    out.push(':root {');
    for (const [name, s] of paints) out.push(`  ${cssVar(name)}: ${s.value};`);
    out.push('}');
  }

  // Effect styles
  const effects = Object.entries(data.effectStyles).filter(([, s]) => s.boxShadow);
  if (effects.length) {
    out.push('\n/* Effect Styles */');
    out.push(':root {');
    for (const [name, s] of effects) out.push(`  ${cssVar(name)}: ${s.boxShadow};`);
    out.push('}');
  }

  // Text styles as classes
  if (Object.keys(data.textStyles).length) {
    out.push('\n/* Text Styles */');
    for (const [name, s] of Object.entries(data.textStyles)) {
      const cls = name.toLowerCase().replace(/\s+/g, '-').replace(/\//g, '-')
        .replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-').replace(/^-+|-+$/g, '');
      out.push(`.text-${cls} {`);
      out.push(`  font-family: '${s.fontFamily}', sans-serif;`);
      out.push(`  font-weight: ${s.fontWeight};`);
      out.push(`  font-size: ${s.fontSize}px;`);
      out.push(`  line-height: ${s.lineHeight};`);
      if (s.letterSpacing !== '0') out.push(`  letter-spacing: ${s.letterSpacing};`);
      if (s.textTransform  !== 'none') out.push(`  text-transform: ${s.textTransform};`);
      if (s.textDecoration !== 'none') out.push(`  text-decoration: ${s.textDecoration};`);
      out.push('}');
    }
  }

  return out.join('\n');
}

function emitCssTokens(out, tokens) {
  for (const [name, token] of Object.entries(tokens)) {
    if (token.value === null || token.value === undefined) continue;
    if (typeof token.value === 'string' && token.value.startsWith('{')) continue;

    let val;
    if (token.type === 'float') {
      val = floatWithUnit(token.value, token.unit);
    } else if (token.type === 'boolean') {
      val = token.value ? '1' : '0';
    } else {
      val = token.value;
    }

    out.push(`  ${cssVar(name)}: ${val};`);
  }
}

// ── TypeScript generator ──────────────────────────────────────────────────────

function generateTS(data) {
  const out = [];
  out.push(`// Figma Token Export — ${data.meta.fileName}`);
  out.push(`// ${data.meta.exportedAt}`);

  // Variables – one export per collection, nested by '/' path, default mode only
  for (const [collName, col] of Object.entries(data.variables)) {
    if (!col.modes?.length) continue;
    const tokens = col[col.modes[0]] ?? {};
    const constName = toCamelCase(collName);

    out.push(`\n// ${collName}`);
    out.push(`export const ${constName} = {`);
    emitTsObject(out, buildNested(tokens), 1);
    out.push('} as const;');
  }

  // Multi-mode helper: export all modes per collection
  const multiModeCollections = Object.entries(data.variables)
    .filter(([, col]) => col.modes?.length > 1);

  if (multiModeCollections.length) {
    out.push('\n// All modes (for theme switching)');
    out.push('export const themes = {');
    for (const [collName, col] of multiModeCollections) {
      out.push(`  ${JSON.stringify(collName)}: {`);
      for (const mode of col.modes) {
        const tokens = col[mode] ?? {};
        out.push(`    ${JSON.stringify(mode)}: {`);
        emitTsObject(out, buildNested(tokens), 3);
        out.push('    },');
      }
      out.push('  },');
    }
    out.push('} as const;');
  }

  // Paint styles
  const paints = Object.entries(data.paintStyles).filter(([, s]) => s.value);
  if (paints.length) {
    out.push('\n// Paint Styles');
    out.push('export const colors = {');
    for (const [name, s] of paints) {
      out.push(`  ${JSON.stringify(name)}: '${s.value}',`);
    }
    out.push('} as const;');
  }

  // Text styles
  if (Object.keys(data.textStyles).length) {
    out.push('\n// Text Styles');
    out.push('export const typography = {');
    for (const [name, s] of Object.entries(data.textStyles)) {
      const { description, ...props } = s;
      out.push(`  ${JSON.stringify(name)}: {`);
      for (const [k, v] of Object.entries(props)) {
        out.push(`    ${k}: ${JSON.stringify(v)},`);
      }
      out.push('  },');
    }
    out.push('} as const;');
  }

  // Effect styles
  const effects = Object.entries(data.effectStyles).filter(([, s]) => s.boxShadow);
  if (effects.length) {
    out.push('\n// Effect Styles');
    out.push('export const shadows = {');
    for (const [name, s] of effects) {
      out.push(`  ${JSON.stringify(name)}: '${s.boxShadow}',`);
    }
    out.push('} as const;');
  }

  return out.join('\n');
}

// Build nested object from flat token map keyed by "Group/Subgroup/Name"
function buildNested(tokens) {
  const root = {};
  for (const [path, token] of Object.entries(tokens)) {
    if (token.value === null || token.value === undefined) continue;

    const parts = path.split('/').map(p => p.trim());
    let cur = root;
    for (let i = 0; i < parts.length - 1; i++) {
      if (typeof cur[parts[i]] !== 'object' || cur[parts[i]] === null) {
        cur[parts[i]] = {};
      }
      cur = cur[parts[i]];
    }

    const leaf = parts[parts.length - 1];
    const val  = token.type === 'float' && token.unit
      ? `${token.value}${token.unit}`
      : token.value;

    // Alias reference → keep as string token
    if (typeof cur[leaf] === 'object' && cur[leaf] !== null) {
      cur[leaf]._value = val;
    } else {
      cur[leaf] = val;
    }
  }
  return root;
}

function emitTsObject(out, obj, depth) {
  const indent = '  '.repeat(depth);
  for (const [key, value] of Object.entries(obj)) {
    if (value !== null && typeof value === 'object') {
      out.push(`${indent}${JSON.stringify(key)}: {`);
      emitTsObject(out, value, depth + 1);
      out.push(`${indent}},`);
    } else {
      out.push(`${indent}${JSON.stringify(key)}: ${JSON.stringify(value)},`);
    }
  }
}

function toCamelCase(str) {
  return str
    .replace(/[^a-zA-Z0-9]+(.)/g, (_, c) => c.toUpperCase())
    .replace(/^[A-Z]/, c => c.toLowerCase());
}

// ── Message handler ───────────────────────────────────────────────────────────

onmessage = (event) => {
  const msg = event.data.pluginMessage;

  if (msg.type === 'error') {
    setStatus(`Error: ${msg.message}`, 'error');
    document.getElementById('btnExport').disabled = false;
    return;
  }

  if (msg.type === 'result') {
    const data = msg.data;
    document.getElementById('fileName').textContent = data.meta.fileName;

    document.getElementById('preview-json').textContent = JSON.stringify(data, null, 2);
    document.getElementById('preview-css').textContent  = generateCSS(data);
    document.getElementById('preview-ts').textContent   = generateTS(data);

    document.getElementById('btnCopy').disabled     = false;
    document.getElementById('btnDownload').disabled = false;
    document.getElementById('btnExport').disabled   = false;

    const counts = [
      Object.keys(data.variables).length   + ' collections',
      Object.keys(data.paintStyles).length + ' paint',
      Object.keys(data.textStyles).length  + ' text',
      Object.keys(data.effectStyles).length + ' effect',
    ].join(' · ');
    setStatus(counts, 'success');
  }
};
</script>
</body>
</html>
